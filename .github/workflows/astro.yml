name: Render and push astro dashboard

on:
  schedule:
    # Every 6 hours -- matches trmnl-wbgt's cadence; moon phase and EoT
    # change slowly enough that the "now" marker doesn't need finer than this.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # needed to commit data/dashboard_*.png back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install DejaVu fonts (for text rendering)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Resolve zip to lat/lon/tz
        id: geo
        env:
          ASTRO_ZIP: ${{ vars.ASTRO_ZIP }}
        run: |
          python -c "
          from astro_core import resolve_zip
          lat, lon, tz = resolve_zip('$ASTRO_ZIP')
          print(f'lat={lat}')
          print(f'lon={lon}')
          print(f'tz={tz}')
          " >> "$GITHUB_OUTPUT"

      - name: Render all eight layout sizes
        run: |
          for layout in full full_portrait half_horizontal half_horizontal_portrait \
                        half_vertical half_vertical_portrait quadrant quadrant_portrait; do
            python render_dashboard.py --lat "${{ steps.geo.outputs.lat }}" \
              --lon "${{ steps.geo.outputs.lon }}" --tz "${{ steps.geo.outputs.tz }}" \
              --layout "$layout" --out "data/dashboard_${layout}.png"
          done

      - name: Commit rendered images
        id: commit
        run: |
          git config user.name "trmnl-astro-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/dashboard_full.png data/dashboard_full_portrait.png \
                  data/dashboard_half_horizontal.png data/dashboard_half_horizontal_portrait.png \
                  data/dashboard_half_vertical.png data/dashboard_half_vertical_portrait.png \
                  data/dashboard_quadrant.png data/dashboard_quadrant_portrait.png
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update astro dashboard images"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify TRMNL via webhook
        if: steps.commit.outputs.changed == 'true'
        env:
          TRMNL_PLUGIN_UUID: ${{ secrets.TRMNL_PLUGIN_UUID }}
        run: |
          SHA=$(git rev-parse HEAD)
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://raw.githubusercontent.com/${REPO}/${SHA}/data"
          curl -sf -X POST "https://trmnl.com/api/custom_plugins/${TRMNL_PLUGIN_UUID}" \
            -H "Content-Type: application/json" \
            -d "{\"merge_variables\": {
              \"image_url_full\": \"${BASE}/dashboard_full.png\",
              \"image_url_full_portrait\": \"${BASE}/dashboard_full_portrait.png\",
              \"image_url_half_horizontal\": \"${BASE}/dashboard_half_horizontal.png\",
              \"image_url_half_horizontal_portrait\": \"${BASE}/dashboard_half_horizontal_portrait.png\",
              \"image_url_half_vertical\": \"${BASE}/dashboard_half_vertical.png\",
              \"image_url_half_vertical_portrait\": \"${BASE}/dashboard_half_vertical_portrait.png\",
              \"image_url_quadrant\": \"${BASE}/dashboard_quadrant.png\",
              \"image_url_quadrant_portrait\": \"${BASE}/dashboard_quadrant_portrait.png\"
            }}"
